<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football AI Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .user-bubble { background: #0d9488; color: white; border-radius: 1rem 1rem 0.25rem 1rem; }
    .assistant-bubble { background: #e2e8f0; color: #475569; border-radius: 1rem 1rem 1rem 0.25rem; }
    .history-item.active { background: #e2e8f0; }
    .status-modal { max-height: 50vh; overflow-y: auto; }
    .status-step { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex">
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm">
    <div class="p-4 border-b border-slate-100">
      <button id="newChatBtn" class="w-full py-2 px-4 bg-teal-500 text-white rounded-lg text-sm font-medium hover:bg-teal-600 transition-colors">Novi chat</button>
    </div>
    <div class="flex-1 overflow-y-auto p-2" id="historyList"></div>
    <div id="noHistory" class="p-4 text-slate-400 text-sm text-center">Nema istorije</div>
  </aside>
  <main class="flex-1 flex flex-col min-w-0">
    <header class="px-6 py-3 border-b bg-white flex items-center gap-3 shrink-0">
      <select id="modelSelect" class="px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-teal-500 focus:border-teal-500"></select>
      <button id="clearChatBtn" class="px-3 py-2 text-sm text-slate-600 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors">Obriši chat</button>
    </header>
    <div class="flex-1 relative overflow-hidden flex flex-col">
      <div id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
      <div id="welcomeMessage" class="absolute inset-0 flex items-center justify-center text-slate-400 text-sm pointer-events-none">
        Pošalji poruku da započneš...
      </div>
    </div>
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-10">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-xl mx-4 overflow-hidden flex flex-col" style="max-height: 85vh;">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center gap-3 shrink-0">
          <svg class="animate-spin w-6 h-6 text-teal-500 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-slate-700 font-medium text-sm">Processing ...</span>
        </div>
        <div class="px-6 py-4 status-modal flex-1 min-h-0">
          <div id="statusSteps" class="space-y-1.5"></div>
          <div id="statusPlaceholder" class="text-slate-400 text-sm">Waiting...</div>
        </div>
      </div>
    </div>
    <div id="errorMessage" class="hidden fixed top-4 right-4 bg-red-50 text-red-700 px-4 py-2 rounded-lg z-20 text-sm border border-red-200"></div>
    <footer class="p-4 border-t bg-white shrink-0">
      <div class="flex gap-2 max-w-3xl mx-auto">
        <input id="messageInput" type="text" placeholder="Tvoja poruka..." class="flex-1 px-4 py-2.5 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
        <button id="sendBtn" class="px-5 py-2.5 bg-teal-500 text-white text-sm font-medium rounded-lg hover:bg-teal-600 transition-colors shrink-0">Pošalji</button>
      </div>
    </footer>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
